services:
  fi-postgres:
    image: postgres:16-alpine
    container_name: fi-postgres
    environment:
      POSTGRES_DB: fi
      POSTGRES_USER: fi_app
      POSTGRES_PASSWORD: CHANGE_ME_LOCAL_DEV_ONLY
    ports:
      - "5435:5432"
    volumes:
      - fi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fi_app -d fi"]
      interval: 5s
      timeout: 5s
      retries: 10

  fi-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fi-app
    depends_on:
      fi-postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__FiDatabase: "Host=fi-postgres;Port=5432;Database=fi;Username=fi_app;Password=CHANGE_ME_LOCAL_DEV_ONLY"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"

volumes:
  fi-postgres-data:
